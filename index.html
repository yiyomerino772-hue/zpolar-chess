<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d14">
<meta name="description" content="ZPolar Chess Engine - Motor de ajedrez con Alpha-Beta y Magic Bitboards">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ZPolar Chess">
<link rel="manifest" href="manifest.json">
<title>ZPolar Chess</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d14; --surface:#16161f; --surface2:#1e1e2c; --surface3:#252538;
  --accent:#7ec87a; --accent2:#c8905a; --accent-dim:#4a7848;
  --text:#e4e4f0; --text-dim:#7878a0;
  --light-sq:#f0d9b5; --dark-sq:#b58863;
  --highlight:rgba(247,247,80,0.55); --selected:rgba(20,100,40,0.65);
  --last-move:rgba(200,210,50,0.38); --check:rgba(220,50,50,0.60);
  --shadow:0 8px 32px rgba(0,0,0,0.6); --radius:14px;
  --board-size:min(96vw,96vh,520px);
  /* Temas del tablero */
  --tsq-light:#f0d9b5; --tsq-dark:#b58863;
}
/* ── Temas ── */
.theme-marble  { --tsq-light:#e8e0d8; --tsq-dark:#8a7d72; }
.theme-ocean   { --tsq-light:#d4e8f0; --tsq-dark:#4a7fa0; }
.theme-forest  { --tsq-light:#d4e8c8; --tsq-dark:#4a7850; }
.theme-night   { --tsq-light:#4a4a60; --tsq-dark:#2a2a3a; }
.theme-royal   { --tsq-light:#f0e8d0; --tsq-dark:#7a5030; }

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  user-select:none;-webkit-user-select:none}

#app{width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;position:relative;overflow:hidden}

/* ── HOME ── */
#home-screen{display:flex;flex-direction:column;align-items:center;
  width:100%;max-width:420px;padding:20px;gap:0;animation:fadeInUp .6s ease both}
.logo-area{text-align:center;margin-bottom:24px}
.mini-board{width:88px;height:88px;display:grid;grid-template-columns:repeat(8,1fr);
  border-radius:8px;overflow:hidden;margin:0 auto 16px;
  box-shadow:0 0 30px rgba(126,200,122,0.2)}
.mini-sq{display:flex;align-items:center;justify-content:center;font-size:7px}
.mini-sq.light{background:var(--tsq-light)}
.mini-sq.dark{background:var(--tsq-dark)}
.game-title{font-family:'Playfair Display',serif;font-size:clamp(38px,10vw,52px);
  font-weight:700;color:var(--text);letter-spacing:1px;line-height:1}
.game-sub{font-size:11px;letter-spacing:7px;color:var(--accent);
  font-weight:500;margin-top:6px;text-transform:uppercase}
.game-badge{display:inline-flex;align-items:center;gap:6px;margin-top:12px;
  padding:5px 14px;background:var(--surface2);border-radius:20px;
  font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}

.mode-buttons{display:flex;flex-direction:column;gap:10px;width:100%}
.mode-btn{display:flex;align-items:center;gap:14px;padding:16px 18px;
  background:var(--surface);border:1.5px solid var(--surface3);
  border-radius:var(--radius);cursor:pointer;transition:all .18s;text-align:left;width:100%}
.mode-btn:hover{border-color:var(--accent-color,var(--accent));transform:translateY(-1px);
  box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.mode-btn:active{transform:scale(0.98)}
.mode-icon{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;
  justify-content:center;font-size:24px;flex-shrink:0}
.mode-info{flex:1}
.mode-label{font-size:14px;font-weight:600;color:var(--text)}
.mode-desc{font-size:12px;color:var(--text-dim);margin-top:2px}
.mode-arrow{color:var(--text-dim);font-size:12px}

.options-row{display:flex;gap:8px;width:100%;margin-top:6px}
.opt-btn{flex:1;padding:9px 6px;background:var(--surface);border:1.5px solid var(--surface3);
  border-radius:10px;cursor:pointer;font-size:11px;font-weight:500;color:var(--text-dim);
  transition:all .15s;font-family:'DM Sans',sans-serif;text-align:center}
.opt-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.opt-btn.active{background:rgba(200,144,90,0.12);border-color:var(--accent2);color:var(--accent2)}

/* ── GAME ── */
#game-screen{display:none;flex-direction:column;align-items:center;
  width:100%;height:100%;padding:6px;gap:4px;animation:fadeInUp .4s ease both}

.top-bar{display:flex;align-items:center;justify-content:space-between;
  width:100%;max-width:var(--board-size);padding:0 2px}
.top-btn{width:34px;height:34px;border-radius:9px;background:var(--surface);
  border:1px solid var(--surface3);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:15px;transition:all .15s;color:var(--text-dim)}
.top-btn:hover{background:var(--surface2);color:var(--text)}

.turn-indicators{display:flex;align-items:center;gap:8px}
.turn-chip{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;
  border:1.5px solid var(--surface3);background:var(--surface);color:var(--text-dim);
  transition:all .3s}
.turn-chip.active-engine{background:rgba(126,200,122,0.12);border-color:var(--accent);color:var(--accent)}
.turn-chip.active-human{background:rgba(200,144,90,0.12);border-color:var(--accent2);color:var(--accent2)}
.vs-text{font-size:11px;color:var(--text-dim)}

/* ── TIMER ── */
.timers{display:flex;justify-content:space-between;width:100%;
  max-width:var(--board-size);padding:0 2px;gap:8px}
.timer-box{flex:1;padding:6px 12px;background:var(--surface);border:1.5px solid var(--surface3);
  border-radius:10px;text-align:center;transition:all .3s}
.timer-box.active{background:rgba(126,200,122,0.1);border-color:var(--accent)}
.timer-box.active-human-t{background:rgba(200,144,90,0.1);border-color:var(--accent2)}
.timer-box.low-time{background:rgba(220,50,50,0.15);border-color:#dc3232;animation:blink .5s infinite}
.timer-label{font-size:10px;color:var(--text-dim);margin-bottom:2px}
.timer-val{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text)}

.captured-row{width:100%;max-width:var(--board-size);height:24px;
  display:flex;align-items:center;padding:0 4px;gap:1px;font-size:15px;line-height:1}

/* ── BOARD ── */
#board-wrap{position:relative;width:var(--board-size);height:var(--board-size);
  border-radius:10px;overflow:hidden;box-shadow:var(--shadow),0 0 60px rgba(126,200,122,0.06);
  flex-shrink:0}
#board{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);
  width:100%;height:100%;position:absolute;inset:0;cursor:pointer}
.sq{position:relative;display:flex;align-items:center;justify-content:center;transition:background .1s}
.sq.light{background:var(--tsq-light)}
.sq.dark{background:var(--tsq-dark)}
.sq.highlighted::after,.sq.selected::after,.sq.last-move::after,.sq.in-check::after{
  content:'';position:absolute;inset:0;pointer-events:none}
.sq.highlighted::after{background:var(--highlight)}
.sq.selected::after{background:var(--selected)}
.sq.last-move::after{background:var(--last-move)}
.sq.in-check::after{background:var(--check)}
.sq.legal-dot::before{content:'';position:absolute;width:30%;height:30%;
  border-radius:50%;background:rgba(0,0,0,0.22);z-index:2;pointer-events:none}
.sq.legal-capture::before{content:'';position:absolute;inset:4px;border-radius:50%;
  border:5px solid rgba(0,0,0,0.22);z-index:2;pointer-events:none}
.coord-rank{position:absolute;top:2px;left:3px;font-size:9px;font-weight:700;
  line-height:1;pointer-events:none;z-index:1}
.coord-file{position:absolute;bottom:2px;right:3px;font-size:9px;font-weight:700;
  line-height:1;pointer-events:none;z-index:1}
.sq.light .coord-rank,.sq.light .coord-file{color:var(--tsq-dark)}
.sq.dark .coord-rank,.sq.dark .coord-file{color:var(--tsq-light)}

/* ── PIECES ── */
.piece{font-size:calc(var(--board-size)/8*0.78);line-height:1;position:relative;z-index:3;
  pointer-events:none;transition:transform .12s ease;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5))}
.piece.white{color:#fff;-webkit-text-stroke:0.5px rgba(80,60,30,0.4)}
.piece.black{color:#1a1a1a;-webkit-text-stroke:0.5px rgba(255,255,255,0.1)}
.sq.selected .piece{transform:scale(1.12)}

/* Animación de movimiento */
@keyframes pieceMove{
  0%{transform:scale(1.2) translateY(-4px)}
  100%{transform:scale(1) translateY(0)}
}
.piece-anim{animation:pieceMove .2s ease both}

/* ── STATUS ── */
.status-bar{width:100%;max-width:var(--board-size);background:var(--surface);
  border:1px solid var(--surface3);border-radius:10px;padding:8px 14px;
  display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;min-height:40px}
.status-icon{font-size:15px;flex-shrink:0}
.status-text{flex:1;color:var(--text-dim)}
.status-bar.check .status-text{color:#ff6464}
.status-bar.thinking .status-text{color:#64aaff}
.status-bar.gameover .status-text{color:var(--accent2)}

/* ── MOVE HISTORY ── */
.move-history{width:100%;max-width:var(--board-size);background:var(--surface);
  border:1px solid var(--surface3);border-radius:10px;padding:6px 10px;
  flex:1;overflow-y:auto;min-height:0;scrollbar-width:thin;scrollbar-color:var(--surface3) transparent}
.move-row{display:grid;grid-template-columns:26px 1fr 1fr;font-size:12px;
  padding:2px 0;font-family:'DM Mono',monospace}
.move-num{color:var(--text-dim)}
.move-w{color:var(--text);font-weight:500}
.move-b{color:var(--text-dim)}
.move-row.last-row .move-w,.move-row.last-row .move-b{color:var(--accent)}

/* ── CONTROLS ── */
.controls{display:flex;gap:6px;width:100%;max-width:var(--board-size);padding:0 0 2px}
.ctrl-btn{flex:1;padding:10px 6px;background:var(--surface);border:1.5px solid var(--surface3);
  border-radius:10px;cursor:pointer;font-size:11px;font-weight:500;color:var(--text-dim);
  display:flex;align-items:center;justify-content:center;gap:4px;transition:all .15s;
  font-family:'DM Sans',sans-serif}
.ctrl-btn:hover{background:var(--surface2);color:var(--text)}
.ctrl-btn.primary{background:rgba(126,200,122,0.1);border-color:var(--accent);color:var(--accent);flex:2}
.ctrl-btn:active{transform:scale(0.97)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;
  align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(8px);
  animation:fadeIn .2s ease}
.modal{background:var(--surface);border:1.5px solid var(--surface3);border-radius:20px;
  padding:26px 22px;width:min(340px,90vw);text-align:center;
  animation:scaleIn .25s cubic-bezier(0.34,1.56,0.64,1) both;box-shadow:var(--shadow)}
.modal-title{font-family:'Playfair Display',serif;font-size:24px;color:var(--text);margin-bottom:6px}
.modal-sub{font-size:14px;color:var(--text-dim);margin-bottom:4px}
.modal-stat{font-size:12px;color:var(--text-dim);margin-bottom:20px;font-family:'DM Mono',monospace}
.modal-buttons{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.modal-btn{padding:10px 20px;border-radius:10px;border:1.5px solid var(--surface3);
  cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .15s}
.modal-btn.primary{background:var(--accent);border-color:var(--accent);color:#000}
.modal-btn.secondary{background:transparent;color:var(--text-dim)}
.modal-btn:hover{opacity:.85;transform:translateY(-1px)}

/* ── THEMES PANEL ── */
.themes-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);
  z-index:90;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.themes-panel.open{display:flex;animation:fadeIn .2s}
.themes-card{background:var(--surface);border-radius:20px 20px 0 0;padding:20px;
  width:100%;max-width:420px;animation:slideUp .3s ease}
.themes-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:16px;text-align:center}
.themes-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.theme-opt{border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid transparent;
  transition:all .2s;aspect-ratio:1}
.theme-opt.selected{border-color:var(--accent)}
.theme-preview{display:grid;grid-template-columns:1fr 1fr;height:100%}
.tp-l{background:var(--pl,#f0d9b5)}
.tp-d{background:var(--pd,#b58863)}
.themes-close{width:100%;padding:12px;background:var(--surface2);border:none;
  border-radius:10px;color:var(--text-dim);font-size:14px;cursor:pointer;
  font-family:'DM Sans',sans-serif}

/* ── STATS PANEL ── */
.stats-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);
  z-index:90;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.stats-panel.open{display:flex;animation:fadeIn .2s}
.stats-card{background:var(--surface);border-radius:20px;padding:24px;
  width:min(340px,90vw);animation:scaleIn .25s ease}
.stats-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--text);
  margin-bottom:20px;text-align:center}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.stat-box{background:var(--surface2);border-radius:12px;padding:14px 8px;text-align:center}
.stat-val{font-size:28px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent)}
.stat-val.loss{color:#ff6464}
.stat-val.draw{color:var(--accent2)}
.stat-label{font-size:11px;color:var(--text-dim);margin-top:4px}
.stat-elo{background:var(--surface2);border-radius:12px;padding:14px;text-align:center;margin-bottom:12px}
.stat-elo-val{font-size:36px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent2)}
.stat-elo-label{font-size:12px;color:var(--text-dim);margin-top:4px}
.stats-close{width:100%;padding:12px;background:var(--surface2);border:none;
  border-radius:10px;color:var(--text-dim);font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* ── SPINNER ── */
.spinner{width:13px;height:13px;border:2px solid rgba(100,170,255,0.3);
  border-top-color:#64aaff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes capture{0%{transform:scale(1.3)}100%{transform:scale(0)}}

@media(max-height:680px){.move-history{display:none}.timers{display:none}}
@media(min-width:768px){:root{--board-size:min(560px,78vh)}}
</style>
</head>
<body>
<div id="app">

<!-- HOME -->
<section id="home-screen">
  <div class="logo-area">
    <div class="mini-board" id="mini-board"></div>
    <div class="game-title">ZPolar</div>
    <div class="game-sub">Chess Engine</div>
    <div class="game-badge">
      <span class="badge-dot"></span>
      Alpha-Beta · Magic Bitboards · 6M nps
    </div>
  </div>

  <div class="mode-buttons">
    <button class="mode-btn" onclick="startGame('white')" style="--accent-color:var(--accent)">
      <div class="mode-icon" style="background:rgba(126,200,122,0.12)">♔</div>
      <div class="mode-info">
        <div class="mode-label">Jugar con Blancas</div>
        <div class="mode-desc">Tú mueves primero</div>
      </div>
      <div class="mode-arrow">›</div>
    </button>
    <button class="mode-btn" onclick="startGame('black')" style="--accent-color:var(--accent2)">
      <div class="mode-icon" style="background:rgba(200,144,90,0.12)">♚</div>
      <div class="mode-info">
        <div class="mode-label">Jugar con Negras</div>
        <div class="mode-desc">ZPolar mueve primero</div>
      </div>
      <div class="mode-arrow">›</div>
    </button>
    <button class="mode-btn" onclick="startGame('white',true)" style="--accent-color:#6090e0">
      <div class="mode-icon" style="background:rgba(96,144,224,0.12)">⚡</div>
      <div class="mode-info">
        <div class="mode-label">Modo Blitz</div>
        <div class="mode-desc">3 min por jugador</div>
      </div>
      <div class="mode-arrow">›</div>
    </button>
  </div>

  <div class="options-row" style="margin-top:10px">
    <button class="opt-btn active" id="d-easy"   onclick="setDiff('easy')">🟢 Fácil</button>
    <button class="opt-btn" id="d-medium" onclick="setDiff('medium')">🟡 Medio</button>
    <button class="opt-btn" id="d-hard"   onclick="setDiff('hard')">🔴 Difícil</button>
    <button class="opt-btn" id="d-master" onclick="setDiff('master')">💀 Maestro</button>
  </div>

  <div class="options-row" style="margin-top:6px">
    <button class="opt-btn" onclick="openThemes()">🎨 Temas</button>
    <button class="opt-btn" onclick="openStats()">📊 Stats</button>
    <button class="opt-btn" id="sound-btn" onclick="toggleSound()">🔊 Sonido</button>
  </div>
</section>

<!-- GAME -->
<section id="game-screen">
  <div class="top-bar">
    <button class="top-btn" onclick="goHome()">←</button>
    <div class="turn-indicators">
      <div class="turn-chip" id="chip-engine">ZPolar</div>
      <span class="vs-text">vs</span>
      <div class="turn-chip" id="chip-human">Tú</div>
    </div>
    <button class="top-btn" onclick="flipBoard()">⇅</button>
  </div>

  <div class="timers" id="timers">
    <div class="timer-box" id="timer-engine">
      <div class="timer-label">ZPolar</div>
      <div class="timer-val" id="tv-engine">—</div>
    </div>
    <div class="timer-box" id="timer-human">
      <div class="timer-label">Tú</div>
      <div class="timer-val" id="tv-human">—</div>
    </div>
  </div>

  <div class="captured-row" id="captured-top"></div>
  <div id="board-wrap"><div id="board"></div></div>
  <div class="captured-row" id="captured-bottom"></div>

  <div class="status-bar" id="status-bar">
    <span class="status-icon">♟</span>
    <span class="status-text" id="status-text">Preparando...</span>
  </div>

  <div class="move-history" id="move-history"></div>

  <div class="controls">
    <button class="ctrl-btn" onclick="undoMove()">↩</button>
    <button class="ctrl-btn primary" onclick="goHome()">+ Nueva</button>
    <button class="ctrl-btn" onclick="flipBoard()">⇅</button>
    <button class="ctrl-btn" onclick="openThemes()">🎨</button>
    <button class="ctrl-btn" onclick="openStats()">📊</button>
  </div>
</section>

<!-- THEMES PANEL -->
<div class="themes-panel" id="themes-panel">
  <div class="themes-card">
    <div class="themes-title">🎨 Tema del tablero</div>
    <div class="themes-grid" id="themes-grid"></div>
    <button class="themes-close" onclick="closeThemes()">Cerrar</button>
  </div>
</div>

<!-- STATS PANEL -->
<div class="stats-panel" id="stats-panel">
  <div class="stats-card">
    <div class="stats-title">📊 Estadísticas</div>
    <div class="stat-elo">
      <div class="stat-elo-val" id="stat-elo">1200</div>
      <div class="stat-elo-label">Rating ELO estimado</div>
    </div>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-val" id="stat-w">0</div>
        <div class="stat-label">Victorias</div>
      </div>
      <div class="stat-box">
        <div class="stat-val loss" id="stat-l">0</div>
        <div class="stat-label">Derrotas</div>
      </div>
      <div class="stat-box">
        <div class="stat-val draw" id="stat-d">0</div>
        <div class="stat-label">Empates</div>
      </div>
    </div>
    <button class="stats-close" onclick="closeStats()">Cerrar</button>
  </div>
</div>

</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════
   SONIDOS (Web Audio API — sin archivos externos)
═══════════════════════════════════════════════════════════ */
let soundEnabled = true;
const AC = window.AudioContext || window.webkitAudioContext;
let ac = null;

function getAC() {
  if (!ac) ac = new AC();
  return ac;
}

function playSound(type) {
  if (!soundEnabled) return;
  try {
    const ctx = getAC();
    const g = ctx.createGain();
    g.connect(ctx.destination);

    if (type === 'move') {
      // Click seco
      const o = ctx.createOscillator();
      o.connect(g);
      o.frequency.setValueAtTime(800, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.08);
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
      o.start(); o.stop(ctx.currentTime + 0.08);
    } else if (type === 'capture') {
      // Impacto
      const o = ctx.createOscillator();
      const o2 = ctx.createOscillator();
      o.connect(g); o2.connect(g);
      o.frequency.setValueAtTime(300, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.15);
      o2.frequency.setValueAtTime(500, ctx.currentTime);
      o2.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.1);
      g.gain.setValueAtTime(0.4, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      o.start(); o.stop(ctx.currentTime + 0.15);
      o2.start(); o2.stop(ctx.currentTime + 0.1);
    } else if (type === 'check') {
      // Alarma
      for (let i = 0; i < 2; i++) {
        const o = ctx.createOscillator();
        o.connect(g);
        o.frequency.setValueAtTime(880, ctx.currentTime + i*0.15);
        g.gain.setValueAtTime(0.3, ctx.currentTime + i*0.15);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.15 + 0.1);
        o.start(ctx.currentTime + i*0.15);
        o.stop(ctx.currentTime + i*0.15 + 0.1);
      }
    } else if (type === 'mate') {
      // Fanfarria descendente
      const notes = [523, 440, 349, 262];
      notes.forEach((freq, i) => {
        const o = ctx.createOscillator();
        o.connect(g);
        o.frequency.setValueAtTime(freq, ctx.currentTime + i*0.18);
        g.gain.setValueAtTime(0.4, ctx.currentTime + i*0.18);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.18 + 0.15);
        o.start(ctx.currentTime + i*0.18);
        o.stop(ctx.currentTime + i*0.18 + 0.15);
      });
    } else if (type === 'castle') {
      // Doble click
      for (let i = 0; i < 2; i++) {
        const o = ctx.createOscillator();
        o.connect(g);
        o.frequency.setValueAtTime(600, ctx.currentTime + i*0.1);
        g.gain.setValueAtTime(0.25, ctx.currentTime + i*0.1);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.1 + 0.07);
        o.start(ctx.currentTime + i*0.1);
        o.stop(ctx.currentTime + i*0.1 + 0.07);
      }
    } else if (type === 'illegal') {
      // Buzz
      const o = ctx.createOscillator();
      o.type = 'sawtooth';
      o.connect(g);
      o.frequency.setValueAtTime(120, ctx.currentTime);
      g.gain.setValueAtTime(0.2, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
      o.start(); o.stop(ctx.currentTime + 0.1);
    }
  } catch(e) {}
}

let stats = { w:0, l:0, d:0, elo:1200 };

function loadStats() {
  try {
    const s = localStorage.getItem('zpolar_stats');
    if (s) stats = JSON.parse(s);
  } catch(e) {}
}

function saveStats() {
  localStorage.setItem('zpolar_stats', JSON.stringify(stats));
}

function updateELO(result) { // 1=win, 0=lose, 0.5=draw
  const K = 32;
  const engineELO = { easy:800, medium:1200, hard:1600, master:2000 }[currentDiff] || 1200;
  const expected = 1 / (1 + Math.pow(10, (engineELO - stats.elo) / 400));
  stats.elo = Math.round(stats.elo + K * (result - expected));
  stats.elo = Math.max(100, Math.min(3000, stats.elo));
}

function recordResult(result) {
  if (result === 'win')  { stats.w++; updateELO(1); }
  if (result === 'loss') { stats.l++; updateELO(0); }
  if (result === 'draw') { stats.d++; updateELO(0.5); }
  saveStats();
}

function openStats() {
  document.getElementById('stat-w').textContent = stats.w;
  document.getElementById('stat-l').textContent = stats.l;
  document.getElementById('stat-d').textContent = stats.d;
  document.getElementById('stat-elo').textContent = stats.elo;
  document.getElementById('stats-panel').classList.add('open');
}
function closeStats() { document.getElementById('stats-panel').classList.remove('open'); }

let timerInterval = null;
let timeEngine = 0, timeHuman = 0;
let timerActive = false, blitzMode = false;
const BLITZ_TIME = 3 * 60; // 3 minutos

function startTimers(blitz) {
  blitzMode = blitz;
  if (!blitz) {
    document.getElementById('timers').style.display = 'none';
    return;
  }
  document.getElementById('timers').style.display = 'flex';
  timeEngine = timeHuman = BLITZ_TIME;
  updateTimerDisplay();
}

function tickTimer() {
  if (!timerActive || !blitzMode) return;
  const humanTurn = game.board.wToMove === game.humanWhite;
  if (humanTurn) timeHuman = Math.max(0, timeHuman - 1);
  else           timeEngine = Math.max(0, timeEngine - 1);
  updateTimerDisplay();
  if (timeHuman <= 0 || timeEngine <= 0) {
    clearInterval(timerInterval);
    game.gameOver = true;
    const loser = timeHuman <= 0 ? 'Tú' : 'ZPolar';
    showModal('⏱ Tiempo agotado', `${loser} se quedó sin tiempo`, '');
    if (timeHuman <= 0) recordResult('loss');
    else               recordResult('win');
  }
}

function updateTimerDisplay() {
  const fmt = s => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  document.getElementById('tv-engine').textContent = fmt(timeEngine);
  document.getElementById('tv-human').textContent  = fmt(timeHuman);
  const humanTurn = game.board.wToMove === game.humanWhite;
  document.getElementById('timer-engine').className = 'timer-box' + (!humanTurn && !game.engineBusy ? ' active' : '');
  document.getElementById('timer-human').className  = 'timer-box' + (humanTurn && !game.engineBusy ? ' active-human-t' : '');
  if (timeHuman < 30) document.getElementById('timer-human').classList.add('low-time');
  if (timeEngine < 30) document.getElementById('timer-engine').classList.add('low-time');
}

class Board {

  isWhite(p){return p>=1&&p<=6}isBlack(p){return p>=7&&p<=12}

  typeOf(p){return p>6?p-6:p}charOf(p){return Object.keys(PIECES).find(k=>PIECES[k]===p)||''}
  setFromFen(fen){
    const parts=fen.split(' ');const ranks=parts[0].split('/');

    if(parts[2].includes('K'))this.castle|=8;if(parts[2].includes('Q'))this.castle|=4;
    if(parts[2].includes('k'))this.castle|=2;if(parts[2].includes('q'))this.castle|=1;
    this.epSq=parts[3]&&parts[3]!=='-'?(parseInt(parts[3][1])-1)*8+(parts[3].charCodeAt(0)-97):-1;
    this.fifty=parseInt(parts[4])||0;
    for(let r=0;r<8;r++){let f=0;for(const ch of ranks[7-r]){if(ch>='1'&&ch<='8')f+=parseInt(ch);else{this.sq[r*8+f]=PIECES[ch]||0;f++}}}
  }
  toFen(){
    let fen='';for(let r=7;r>=0;r--){let e=0;for(let f=0;f<8;f++){const p=this.sq[r*8+f];if(!p)e++;else{if(e){fen+=e;e=0}fen+=this.charOf(p)}}if(e)fen+=e;if(r)fen+='/'}
    fen+=' '+(this.wToMove?'w':'b');let cas='';
    if(this.castle&8)cas+='K';if(this.castle&4)cas+='Q';if(this.castle&2)cas+='k';if(this.castle&1)cas+='q';
    fen+=' '+(cas||'-')+' '+(this.epSq>=0?FILES[this.epSq&7]+((this.epSq>>3)+1):'-')+' '+this.fifty+' 1';return fen;
  }
  moves(captOnly=false){
    const list=[];
    for(let sq=0;sq<64;sq++){const p=this.sq[sq];if(!p||!this.isFriend(p))continue;const t=this.typeOf(p);
      if(t===1)this._pawn(sq,list,captOnly);else if(t===2)this._knight(sq,list,captOnly);
      else if(t===3)this._slide(sq,list,[[1,1],[-1,1],[1,-1],[-1,-1]],captOnly);
      else if(t===4)this._slide(sq,list,[[1,0],[-1,0],[0,1],[0,-1]],captOnly);
      else if(t===5){this._slide(sq,list,[[1,0],[-1,0],[0,1],[0,-1]],captOnly);this._slide(sq,list,[[1,1],[-1,1],[1,-1],[-1,-1]],captOnly)}
      else if(t===6)this._king(sq,list,captOnly)}return list}
  _add(from,to,flags,list,co){const cap=this.sq[to]!==0||(flags&4);if(co&&!cap&&!(flags&8))return;list.push({from,to,flags:flags||0})}
  _pawn(sq,list,co){
    const r=sq>>3,f=sq&7,dir=this.wToMove?1:-1,start=this.wToMove?1:6,pr=this.wToMove?7:0;
    const nr=r+dir;if(nr>=0&&nr<8){const fwd=nr*8+f;if(!this.sq[fwd]){if(!co){if(nr===pr)[2,3,4,5].forEach(pp=>list.push({from:sq,to:fwd,flags:8,promo:pp}));else{list.push({from:sq,to:fwd,flags:0});if(r===start&&!this.sq[(nr+dir)*8+f])list.push({from:sq,to:(nr+dir)*8+f,flags:2})}}};
    for(const df of[-1,1]){const cf=f+df;if(cf<0||cf>7)continue;const csq=nr*8+cf;if(this.isEnemy(this.sq[csq])||csq===this.epSq){const isEP=csq===this.epSq;if(nr===pr&&!isEP)[2,3,4,5].forEach(pp=>list.push({from:sq,to:csq,flags:8,promo:pp}));else list.push({from:sq,to:csq,flags:isEP?4:1})}}}
  }
  _knight(sq,list,co){const r=sq>>3,f=sq&7;for(const[dr,df]of[[2,1],[2,-1],[-2,1],[-2,-1],[1,2],[1,-2],[-1,2],[-1,-2]]){const nr=r+dr,nf=f+df;if(nr<0||nr>7||nf<0||nf>7)continue;const to=nr*8+nf;if(!this.isFriend(this.sq[to]))this._add(sq,to,this.sq[to]?1:0,list,co)}}
  _slide(sq,list,dirs,co){const r=sq>>3,f=sq&7;for(const[dr,df]of dirs){let nr=r+dr,nf=f+df;while(nr>=0&&nr<8&&nf>=0&&nf<8){const to=nr*8+nf,p=this.sq[to];if(this.isFriend(p))break;this._add(sq,to,p?1:0,list,co);if(p)break;nr+=dr;nf+=df}}}
  _king(sq,list,co){const r=sq>>3,f=sq&7;for(let dr=-1;dr<=1;dr++)for(let df=-1;df<=1;df++){if(!dr&&!df)continue;const nr=r+dr,nf=f+df;if(nr<0||nr>7||nf<0||nf>7)continue;const to=nr*8+nf;if(!this.isFriend(this.sq[to]))this._add(sq,to,this.sq[to]?1:0,list,co)}
    if(co)return;
    if(this.wToMove){if((this.castle&8)&&!this.sq[5]&&!this.sq[6]&&!this._atk(4,true)&&!this._atk(5,true)&&!this._atk(6,true))list.push({from:sq,to:6,flags:16});if((this.castle&4)&&!this.sq[1]&&!this.sq[2]&&!this.sq[3]&&!this._atk(4,true)&&!this._atk(3,true)&&!this._atk(2,true))list.push({from:sq,to:2,flags:32})}
    else{if((this.castle&2)&&!this.sq[61]&&!this.sq[62]&&!this._atk(60,false)&&!this._atk(61,false)&&!this._atk(62,false))list.push({from:sq,to:62,flags:16});if((this.castle&1)&&!this.sq[57]&&!this.sq[58]&&!this.sq[59]&&!this._atk(60,false)&&!this._atk(59,false)&&!this._atk(58,false))list.push({from:sq,to:58,flags:32})}}
  _atk(sq,byW){
    const r=sq>>3,f=sq&7,ep=byW?PIECES.P:PIECES.p,en=byW?PIECES.N:PIECES.n,eb=byW?PIECES.B:PIECES.b,er=byW?PIECES.R:PIECES.r,eq=byW?PIECES.Q:PIECES.q,ek=byW?PIECES.K:PIECES.k,dir=byW?-1:1;
    for(const df of[-1,1]){const nr=r+dir,nf=f+df;if(nr>=0&&nr<8&&nf>=0&&nf<8&&this.sq[nr*8+nf]===ep)return true}
    for(const[dr,df]of[[2,1],[2,-1],[-2,1],[-2,-1],[1,2],[1,-2],[-1,2],[-1,-2]]){const nr=r+dr,nf=f+df;if(nr>=0&&nr<8&&nf>=0&&nf<8&&this.sq[nr*8+nf]===en)return true}
    for(const[dr,df]of[[1,1],[1,-1],[-1,1],[-1,-1]]){let nr=r+dr,nf=f+df;while(nr>=0&&nr<8&&nf>=0&&nf<8){const p=this.sq[nr*8+nf];if(p){if(p===eb||p===eq)return true;break}nr+=dr;nf+=df}}
    for(const[dr,df]of[[1,0],[-1,0],[0,1],[0,-1]]){let nr=r+dr,nf=f+df;while(nr>=0&&nr<8&&nf>=0&&nf<8){const p=this.sq[nr*8+nf];if(p){if(p===er||p===eq)return true;break}nr+=dr;nf+=df}}
    for(let dr=-1;dr<=1;dr++)for(let df=-1;df<=1;df++){if(!dr&&!df)continue;const nr=r+dr,nf=f+df;if(nr>=0&&nr<8&&nf>=0&&nf<8&&this.sq[nr*8+nf]===ek)return true}
    return false}
  inCheck(){const kp=this.wToMove?PIECES.K:PIECES.k;const ks=this.sq.indexOf(kp);return ks>=0&&this._atk(ks,!this.wToMove)}
  makeMove(m){
    const saved={sq:[...this.sq],wToMove:this.wToMove,castle:this.castle,epSq:this.epSq,fifty:this.fifty};
    const{from,to,flags,promo}=m;const piece=this.sq[from];const type=this.typeOf(piece);
    this.fifty++;if(type===1||this.sq[to])this.fifty=0;this.epSq=-1;
    if(flags===4){const capSq=(from>>3)*8+(to&7);this.sq[capSq]=0}
    if(flags===16){if(this.wToMove){this.sq[5]=this.sq[7];this.sq[7]=0}else{this.sq[61]=this.sq[63];this.sq[63]=0}}
    if(flags===32){if(this.wToMove){this.sq[3]=this.sq[0];this.sq[0]=0}else{this.sq[59]=this.sq[56];this.sq[56]=0}}
    if(flags===2)this.epSq=((from>>3)+(this.wToMove?1:-1))*8+(from&7);
    if(flags===8&&promo){this.sq[to]=this.wToMove?promo:promo+6;this.sq[from]=0}
    else{this.sq[to]=piece;this.sq[from]=0}
    if(piece===PIECES.K)this.castle&=~12;if(piece===PIECES.k)this.castle&=~3;
    if(from===0||to===0)this.castle&=~4;if(from===7||to===7)this.castle&=~8;
    if(from===56||to===56)this.castle&=~1;if(from===63||to===63)this.castle&=~2;
    this.wToMove=!this.wToMove;return saved}
  undoMove(saved){this.sq=saved.sq;this.wToMove=saved.wToMove;this.castle=saved.castle;this.epSq=saved.epSq;this.fifty=saved.fifty}
  legalMoves(){const ps=this.moves(false),legal=[];for(const m of ps){const s=this.makeMove(m);this.wToMove=!this.wToMove;const ok=!this.inCheck();this.wToMove=!this.wToMove;this.undoMove(s);if(ok)legal.push(m)}return legal}
  evaluate(){
    let mg=0,eg=0,phase=0;const pw=[0,0,1,1,2,4,0];
    for(let sq=0;sq<64;sq++){const p=this.sq[sq];if(!p)continue;const w=this.isWhite(p),t=this.typeOf(p),sign=w?1:-1,pc='PNBRQK'[t-1];
      mg+=sign*(PIECE_VALS[p]+pstGet(pc,sq,w));eg+=sign*(PIECE_VALS[p]+(t===6?pstGet('KE',sq,w):pstGet(pc,sq,w)));phase+=pw[t]}
    phase=Math.min(phase,24);const score=(mg*phase+eg*(24-phase))/24;return this.wToMove?score:-score}
  isInsuf(){const c=this.sq.filter(p=>p).length;if(c===2)return true;if(c===3){const t=this.sq.filter(p=>p).map(p=>this.typeOf(p));if(t.includes(2)||t.includes(3))return true}return false}
  moveToUci(m){return FILES[m.from&7]+((m.from>>3)+1)+FILES[m.to&7]+((m.to>>3)+1)+(m.flags===8&&m.promo?'nbrq'[m.promo-2]:'')}
}

const TT=new Map();
let ENGINE_DEPTH=3,ENGINE_TIME=1000;
let currentDiff='easy';

function scoreMove(b,m){let s=0;const cap=b.sq[m.to];if(cap)s+=PIECE_VALS[cap]*10-PIECE_VALS[b.sq[m.from]];if(m.flags===8)s+=8000;return s}
function qsearch(b,alpha,beta,d){const stand=b.evaluate();if(stand>=beta)return beta;if(stand>alpha)alpha=stand;if(d<=0)return alpha;
  for(const m of b.moves(true).sort((a,c)=>scoreMove(b,c)-scoreMove(b,a))){const s=b.makeMove(m);b.wToMove=!b.wToMove;const ok=!b.inCheck();b.wToMove=!b.wToMove;if(!ok){b.undoMove(s);continue}const score=-qsearch(b,-beta,-alpha,d-1);b.undoMove(s);if(score>=beta)return beta;if(score>alpha)alpha=score}return alpha}
function ab(b,d,alpha,beta,root){if(b.fifty>=100)return 0;const key=b.toFen();if(!root&&TT.has(key)){const e=TT.get(key);if(e.depth>=d)return e.score}
  if(d<=0)return qsearch(b,alpha,beta,4);const moves=b.legalMoves().sort((a,c)=>scoreMove(b,c)-scoreMove(b,a));if(!moves.length)return b.inCheck()?-(20000-d):0;
  let best=null;for(const m of moves){const s=b.makeMove(m);const score=-ab(b,d-1,-beta,-alpha,false);b.undoMove(s);if(score>=beta){TT.set(key,{depth:d,score:beta});return beta}if(score>alpha){alpha=score;best=m}}if(best)TT.set(key,{depth:d,score:alpha,move:best});return alpha}
function getBestMove(b){TT.clear();let best=null;const start=Date.now();
  for(let d=1;d<=ENGINE_DEPTH;d++){let bm=null,bs=-Infinity;for(const m of b.legalMoves().sort((a,c)=>scoreMove(b,c)-scoreMove(b,a))){const s=b.makeMove(m);const score=-ab(b,d-1,-Infinity,Infinity,false);b.undoMove(s);if(score>bs){bs=score;bm=m}}if(bm)best=bm;if(Date.now()-start>ENGINE_TIME*0.85)break}return best}

/* ═══════════════════════════════════════════════════════════
   ESTADO DEL JUEGO
═══════════════════════════════════════════════════════════ */
const game={board:new Board(),humanWhite:true,flipped:false,selected:null,
  legalDests:new Set(),history:[],moveLog:[],engineBusy:false,gameOver:false,lastFrom:null,lastTo:null};

function setDiff(level){
  document.querySelectorAll('.opt-btn[id^="d-"]').forEach(b=>b.classList.remove('active'));
  document.getElementById('d-'+level).classList.add('active');
  currentDiff=level;
  const cfg={easy:[3,800],medium:[5,1500],hard:[7,2500],master:[9,4000]};
  [ENGINE_DEPTH,ENGINE_TIME]=cfg[level];
}

function startGame(color,blitz=false){
  game.humanWhite=color==='white';game.flipped=color==='black';
  if(blitz){ENGINE_DEPTH=3;ENGINE_TIME=500}
  game.board=new Board();
  game.board.setFromFen('rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1');
  game.selected=null;game.legalDests=new Set();game.history=[];game.moveLog=[];
  game.engineBusy=false;game.gameOver=false;game.lastFrom=null;game.lastTo=null;
  document.getElementById('home-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  startTimers(blitz);
  if(blitz){clearInterval(timerInterval);timerActive=true;timerInterval=setInterval(tickTimer,1000)}
  renderBoard();updateStatus();updateTurnChips();updateMoveHistory();
  if(!game.humanWhite)setTimeout(triggerEngine,300);
}

function goHome(){
  clearInterval(timerInterval);timerActive=false;
  document.getElementById('game-screen').style.display='none';
  document.getElementById('home-screen').style.display='flex';
}

/* ═══════════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════════ */
function renderBoard(){
  const boardEl=document.getElementById('board');boardEl.innerHTML='';
  for(let row=0;row<8;row++){
    for(let col=0;col<8;col++){
      const sq=document.createElement('div');sq.className='sq';
      const file=game.flipped?7-col:col,rank=game.flipped?row:7-row,sqIdx=rank*8+file;
      sq.classList.add((file+rank)%2===0?'dark':'light');sq.dataset.sq=sqIdx;
      if(game.lastFrom!==null&&sqIdx===game.lastFrom)sq.classList.add('last-move');
      if(game.lastTo!==null&&sqIdx===game.lastTo)sq.classList.add('last-move');
      if(game.selected!==null&&sqIdx===game.selected)sq.classList.add('selected');
      if(game.legalDests.has(sqIdx))sq.classList.add(game.board.sq[sqIdx]?'legal-capture':'legal-dot');
      if(game.board.inCheck()){const kp=game.board.wToMove?PIECES.K:PIECES.k;if(game.board.sq[sqIdx]===kp)sq.classList.add('in-check')}
      if(col===0){const cr=document.createElement('span');cr.className='coord-rank';cr.textContent=rank+1;sq.appendChild(cr)}
      if(row===7){const cf=document.createElement('span');cf.className='coord-file';cf.textContent=FILES[file];sq.appendChild(cf)}
      const p=game.board.sq[sqIdx];
      if(p){const pe=document.createElement('span');pe.className='piece '+(game.board.isWhite(p)?'white':'black');pe.textContent=UNICODE[game.board.charOf(p)]||'';sq.appendChild(pe)}
      sq.addEventListener('click',()=>handleClick(sqIdx));
      boardEl.appendChild(sq);
    }
  }
  updateCaptured();
}

/* ═══════════════════════════════════════════════════════════
   INTERACCIÓN
═══════════════════════════════════════════════════════════ */
function handleClick(sqIdx){
  if(game.gameOver||game.engineBusy)return;
  const humanColor=game.humanWhite,isHumanTurn=game.board.wToMove===humanColor;
  if(!isHumanTurn)return;
  const piece=game.board.sq[sqIdx],isFriend=game.board.isFriend(piece);
  if(game.selected===null){
    if(piece&&isFriend){game.selected=sqIdx;game.legalDests=getLegalDestsFor(sqIdx);renderBoard()}
  } else {
    if(game.legalDests.has(sqIdx)){makeHumanMove(game.selected,sqIdx)}
    else if(sqIdx===game.selected){game.selected=null;game.legalDests=new Set();renderBoard()}
    else if(piece&&isFriend){game.selected=sqIdx;game.legalDests=getLegalDestsFor(sqIdx);renderBoard()}
    else{game.selected=null;game.legalDests=new Set();renderBoard()}
  }
}

function getLegalDestsFor(from){return new Set(game.board.legalMoves().filter(m=>m.from===from).map(m=>m.to))}

function makeHumanMove(from,to){
  const legal=game.board.legalMoves().filter(m=>m.from===from&&m.to===to);
  if(!legal.length)return;
  const move=legal.find(m=>m.flags!==8)||legal.find(m=>m.promo===5)||legal[0];
  applyMove(move);game.selected=null;game.legalDests=new Set();
  if(!game.gameOver)setTimeout(triggerEngine,80);
}

function applyMove(move){
  const b=game.board;
  const isCapture=b.sq[move.to]!==0||(move.flags===4);
  const isCastle=move.flags===16||move.flags===32;
  const san=moveToSan(b,move);
  b.makeMove(move);
  game.lastFrom=move.from;game.lastTo=move.to;
  game.history.push({move});game.moveLog.push(san);
  // Sonidos
  if(isCastle)playSound('castle');
  else if(isCapture)playSound('capture');
  else playSound('move');
  // Animar pieza destino
  setTimeout(()=>{
    const sqs=document.querySelectorAll('.sq');
    sqs.forEach(sq=>{
      if(parseInt(sq.dataset.sq)===move.to){
        const pe=sq.querySelector('.piece');
        if(pe){pe.classList.remove('piece-anim');void pe.offsetWidth;pe.classList.add('piece-anim')}
      }
    });
  },10);
  renderBoard();checkGameOver();updateStatus();updateTurnChips();updateMoveHistory();
  if(blitzMode)updateTimerDisplay();
}

function moveToSan(board,move){
  const from=move.from,to=move.to,piece=board.sq[from],type=board.typeOf(piece),cap=board.sq[to]||move.flags===4;
  let san='';
  if(move.flags===16||move.flags===32)return move.flags===16?'O-O':'O-O-O';
  if(type===2)san='N';else if(type===3)san='B';else if(type===4)san='R';else if(type===5)san='Q';else if(type===6)san='K';
  if(type===1&&cap)san=FILES[from&7];if(cap)san+='x';san+=FILES[to&7]+((to>>3)+1);
  if(move.flags===8&&move.promo)san+='='+'NBRQ'[move.promo-2];return san;
}

function triggerEngine(){
  if(game.gameOver||game.engineBusy)return;
  game.engineBusy=true;timerActive=true;updateStatus();
  setTimeout(()=>{
    const move=getBestMove(game.board);game.engineBusy=false;
    if(move)applyMove(move);else checkGameOver();
  },30);
}

function checkGameOver(){
  const legal=game.board.legalMoves();
  if(!legal.length){
    game.gameOver=true;clearInterval(timerInterval);
    if(game.board.inCheck()){
      playSound('mate');
      const winner=game.board.wToMove?'Negras':'Blancas';
      const humanWon=(game.board.wToMove===game.humanWhite)?false:true;
      setTimeout(()=>showModal('¡Jaque Mate!',`Ganan las ${winner}`,`${Math.ceil(game.moveLog.length/2)} movimientos`),400);
      recordResult(humanWon?'win':'loss');
    } else {
      setTimeout(()=>showModal('Tablas','Ahogado — Sin movimientos',''),400);
      recordResult('draw');
    }
    return;
  }
  if(game.board.isInsuf()){game.gameOver=true;recordResult('draw');setTimeout(()=>showModal('Tablas','Material insuficiente',''),400);return}
  if(game.board.fifty>=100){game.gameOver=true;recordResult('draw');setTimeout(()=>showModal('Tablas','Regla de 50 movimientos',''),400);return}
  if(game.board.inCheck())playSound('check');
}

/* ═══════════════════════════════════════════════════════════
   UI
═══════════════════════════════════════════════════════════ */
function updateStatus(){
  const sb=document.getElementById('status-bar'),st=document.getElementById('status-text');
  sb.className='status-bar';
  if(game.engineBusy){sb.classList.add('thinking');sb.querySelector('.status-icon').innerHTML='<div class="spinner"></div>';st.textContent='ZPolar está pensando...';return}
  sb.querySelector('.status-icon').textContent='♟';
  if(game.gameOver){sb.classList.add('gameover');return}
  if(game.board.inCheck()){sb.classList.add('check');st.textContent=`¡Jaque a las ${game.board.wToMove?'blancas':'negras'}!`;return}
  st.textContent=`Turno: ${game.board.wToMove?'Blancas':'Negras'}`;
}

function updateTurnChips(){
  const ce=document.getElementById('chip-engine'),ch=document.getElementById('chip-human');
  ce.className='turn-chip';ch.className='turn-chip';
  if(game.gameOver)return;
  const humanTurn=game.board.wToMove===game.humanWhite;
  if(!humanTurn||game.engineBusy)ce.classList.add('active-engine');
  if(humanTurn&&!game.engineBusy)ch.classList.add('active-human');
}

function updateMoveHistory(){
  const el=document.getElementById('move-history');if(!el)return;el.innerHTML='';
  const moves=game.moveLog;
  for(let i=0;i<moves.length;i+=2){
    const row=document.createElement('div');const isLast=i>=moves.length-2;
    row.className='move-row'+(isLast?' last-row':'');
    row.innerHTML=`<span class="move-num">${i/2+1}.</span><span class="move-w">${moves[i]||''}</span><span class="move-b">${moves[i+1]||''}</span>`;
    el.appendChild(row);
  }
  el.scrollTop=el.scrollHeight;
}

function updateCaptured(){
  const b=game.board;const start={P:8,N:2,B:2,R:2,Q:1};const wCap=[],bCap=[];
  for(const[ch,cnt]of Object.entries(start)){const wp=PIECES[ch],bp=PIECES[ch.toLowerCase()];
    const wc=b.sq.filter(p=>p===wp).length,bc=b.sq.filter(p=>p===bp).length;
    for(let i=0;i<cnt-wc;i++)bCap.push(UNICODE[ch.toLowerCase()]);
    for(let i=0;i<cnt-bc;i++)wCap.push(UNICODE[ch])}
  const top=game.flipped?wCap:bCap,bot=game.flipped?bCap:wCap;
  document.getElementById('captured-top').textContent=top.join('');
  document.getElementById('captured-bottom').textContent=bot.join('');
}

function flipBoard(){game.flipped=!game.flipped;renderBoard()}

function undoMove(){
  if(game.engineBusy||game.history.length<2)return;
  for(let i=0;i<2;i++){const h=game.history.pop();if(h){game.board.undoMove?game.board.undoMove(h.saved):null;game.moveLog.pop()}}
  // Reconstruir tablero desde FEN inicial
  const fen='rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';
  const tmp=new Board();tmp.setFromFen(fen);
  const allMoves=[...game.history];
  game.history=[];game.moveLog=[];game.board=tmp;
  for(const h of allMoves){const san=moveToSan(game.board,h.move);game.board.makeMove(h.move);game.history.push(h);game.moveLog.push(san)}
  game.lastFrom=game.history.length?game.history[game.history.length-1].move.from:null;
  game.lastTo=game.history.length?game.history[game.history.length-1].move.to:null;
  game.gameOver=false;game.selected=null;game.legalDests=new Set();
  renderBoard();updateStatus();updateTurnChips();updateMoveHistory();
}

function showModal(title,sub,stat){
  const moves=Math.ceil(game.moveLog.length/2);
  const overlay=document.createElement('div');overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal"><div class="modal-title">${title}</div><div class="modal-sub">${sub}</div><div class="modal-stat">${stat||(moves+' mov.')}</div><div class="modal-buttons"><button class="modal-btn secondary" onclick="this.closest('.modal-overlay').remove();goHome()">Menú</button><button class="modal-btn primary" onclick="this.closest('.modal-overlay').remove();startGame(game.humanWhite?'white':'black')">Revancha ♟</button></div></div>`;
  document.body.appendChild(overlay);
}

/* ── Mini tablero home ── */
function buildMiniBoard(){
  const mb=document.getElementById('mini-board');
  const setup='rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR';
  const ranks=setup.split('/');
  for(let r=7;r>=0;r--){let f=0;for(const ch of ranks[7-r]){if(ch>='1'&&ch<='8'){for(let i=0;i<parseInt(ch);i++){const sq=document.createElement('div');sq.className='mini-sq '+((f+r)%2===0?'dark':'light');mb.appendChild(sq);f++}}else{const sq=document.createElement('div');sq.className='mini-sq '+((f+r)%2===0?'dark':'light');sq.textContent=UNICODE[ch]||'';mb.appendChild(sq);f++}}}
}

/* ── Teclado ── */
document.addEventListener('keydown',e=>{
  if(e.key==='f'||e.key==='F')flipBoard();
  if(e.key==='u'||e.key==='U')undoMove();
  if(e.key==='Escape')goHome();
});

/* ── Init ── */
loadStats();
buildMiniBoard();
// Cargar preferencias
const savedTheme=localStorage.getItem('zpolar_theme');
if(savedTheme)applyTheme(savedTheme);
const savedSound=localStorage.getItem('zpolar_sound');
if(savedSound==='0'){soundEnabled=false;document.getElementById('sound-btn').textContent='🔇 Mudo'}
setDiff('easy');
</script>
